<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Haystack{% endblock %}</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC" crossorigin="anonymous"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/providers.css') }}">
    {% block extra_css %}{% endblock %}
    {% block head %}{% endblock %}
</head>
<body>
    <header class="top-nav">
        <div class="logo">
            <a href="{{ url_for('root.index') }}" style="color: var(--color-bg); font-weight: bold; font-size: 1.25rem;">The Haystack</a>
        </div>
        <form class="search-box" action="{{ url_for('root.search_view') }}" method="get" style="display: flex;">
            <input type="text" name="q" placeholder="Search providers, programs, fields..." value="{{ q | default('') }}">
        </form>
        <nav class="nav-links">
            <a href="{{ url_for('root.providers_directory') }}">Providers</a>
            <a href="{{ url_for('root.programs_directory') }}">Programs</a>
            <a href="{{ url_for('root.fields_directory') }}">Fields</a>
            <a href="{{ url_for('root.map_view') }}">Map</a>
            <a href="#">Methods</a>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.85rem;">
        <p>The Haystack &copy; 2026 &mdash; Data sourced from IPEDS (NCES). Built for the Kansas City region.</p>
    </footer>
    <script>
    // Enable data-href row navigation for clickable table rows
    document.addEventListener('click', function(e) {
      var row = e.target.closest('tr[data-href]');
      if (row && !e.target.closest('a') && !e.target.closest('button')) {
        window.location = row.dataset.href;
      }
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
