<div class="step-header" style="animation: fadeIn 0.4s ease-out;">
  <h2 style="font-size:1.8rem; margin-bottom:0.5rem; color:var(--text-main);">What job are you aiming for?</h2>
  <p style="color:var(--text-muted); font-size:1rem; margin-bottom:1.5rem;">Search by job title or SOC code (e.g. Registered Nurse, Welder, 29-1141)</p>
</div>

<div class="typeahead-wrapper" style="max-width:500px; margin:0 auto; padding: 2rem; background:white; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.05); border:1px solid var(--color-border);">
  
  <input type="hidden" name="soc" id="selected-soc" value="">
  
  <div style="position:relative;">
    <div style="position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:1.2rem;">🔍</div>
    <input type="text" class="typeahead-input" id="occ-search" name="q"
           placeholder="Start typing an occupation..." autocomplete="off"
           style="padding-left: 2.8rem; outline:none;"
           hx-get="{{ url_for('api_v1.search_occupations') }}"
           hx-trigger="keyup changed delay:300ms, search"
           hx-target="#occ-results"
           onkeydown="if(event.key==='Enter') event.preventDefault(); document.getElementById('btn-step3').disabled = true;">
           
    <div class="typeahead-dropdown" id="occ-results" style="box-shadow:0 10px 30px rgba(0,0,0,0.15);">
      <!-- Results injected here -->
    </div>
  </div>
  
  <div style="text-align:center; margin-top: 2rem;">
    <button type="submit" class="tab" style="background:var(--color-primary); color:white; padding:0.8rem 2rem; font-size:1.1rem; border-radius:30px; width:100%; justify-content:center; opacity:0.5; cursor:not-allowed;"
            id="btn-step3" disabled>Find Matching Programs →</button>
  </div>
  
</div>

<script>
function selectOccupation(soc, title) {
    document.getElementById('selected-soc').value = soc;
    document.getElementById('occ-search').value = title;
    document.getElementById('occ-results').innerHTML = '';
    
    // Enable submit button
    const btn = document.getElementById('btn-step3');
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.style.cursor = 'pointer';
}

// Close dropdown if clicking outside
document.addEventListener('click', function(e) {
    if (!e.target.closest('.typeahead-wrapper')) {
        const results = document.getElementById('occ-results');
        if(results) results.innerHTML = '';
    }
});
</script>
